#Log level ref
log_levels:
  NOTSET:     0
  DEBUG:     10
  INFO:      20
  WARNING:   30
  ERROR:     40
  CRITICAL:  50


#Format strings
file_line_format: '%(asctime)s %(msecs)03d %(name)s %(levelname)s %(funcName)s(%(lineno)d) %(message)s'
file_date_format: '%Y_%m_%d_%H_%M_%S'
terminal_line_format: '%(asctime)s %(name)s %(message)s'
terminal_date_format: '%Y_%m_%d_%H_%M_%S'
